defaults: &defaults
  ansible_connection: ssh
  ansible_ssh_private_key_file: "~/.ssh/homelab"
  ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

all:
  hosts:
    vyos:
      ansible_host: 192.168.0.10

    management:
      ansible_host: 10.10.10.50
      ansible_user: ubuntu
      <<: *defaults

    s3:
      ansible_host: 10.10.30.11
      ansible_user: ubuntu
      <<: *defaults

    psql:
      ansible_host: 10.10.30.12
      ansible_user: ubuntu
      <<: *defaults

    bastion:
      ansible_host: 10.10.100.10
      ansible_user: root
      <<: *defaults
    
    docker_host:
      ansible_host: 10.10.20.40
      ansible_user: ubuntu
      <<: *defaults

  children:
    vms:
      hosts:
        bastion:
        s3:
        psql:
        management:
        docker_host:
    garage:
      hosts:
        s3:
    postgresql:
      hosts:
        psql:
    kubernetes_nodes:
      hosts:
