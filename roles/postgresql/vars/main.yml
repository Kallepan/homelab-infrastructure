postgresql_necessary_packages:
  - git
  - build-essential
  - libssl-dev
  - libreadline-dev 
  - zlib1g-dev
  - unzip

postgresql_version: '18'
postgresql_ubuntu_version: '24.04'

postgresql_packages: 
  - postgresql-{{ postgresql_version }}

postgresql_listen_addresses: '*'
postgresql_port: 5432

# S3 bucket region for WAL-G backups
postgresql_aws_region: 'eu-west-1'
postgresql_aws_endpoint: 's3.storage.home.arpa'
postgresql_aws_ca_bundle: "/usr/local/share/ca-certificates/root-ca.crt"

postgresql_gpg_key_url: https://www.postgresql.org/media/keys/ACCC4CF8.asc

postgresql_certs_cert: "{{ role_path }}/../../pki/intermediate-ca-2/certs/home-arpa.crt"
postgresql_certs_ca: "{{ role_path }}/../../pki/intermediate-ca-2/intermediate-ca-2-chain.pem"
postgresql_certs_key: "{{ role_path }}/../../pki/intermediate-ca-2/private/home-arpa.key"

postgresql_aws_bucket: 'backups'

postgresql_exporter_user: 'postgres_exporter'
postgresql_exporter_version: 0.18.1
postgresql_exporter_url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v{{ postgresql_exporter_version }}/postgres_exporter-{{ postgresql_exporter_version }}.linux-amd64.tar.gz"
postgresql_exporter_port: "9187"

postgresql_max_connections: 1000

# WAL-G configuration
postgresql_wal_g_version: 'v3.0.8'
postgresql_wal_g_url: "https://github.com/wal-g/wal-g/releases/download/{{ postgresql_wal_g_version }}/wal-g-pg-{{ postgresql_ubuntu_version }}-amd64.tar.gz"
postgresql_wal_g_s3_prefix: "s3://{{ postgresql_aws_bucket }}/wal-g"

# AWS SSL configuration
postgresql_aws_ssl_verify: 'false'

# WAL-G retention configuration
postgresql_retention_full: 3

# WAL-G backup schedule configuration
postgresql_backup_full_hour: "2"
postgresql_backup_full_minute: "0"

# WAL-G cleanup schedule configuration
postgresql_backup_cleanup_hour: "3"
postgresql_backup_cleanup_minute: "0"
